<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>气球射击游戏</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('bg_balloon.jpg');
      background-size: cover;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 顶部控制栏 */
    .top-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      background-color: rgba(255, 255, 255, 0.7);
      border-bottom: 2px solid #ccc;
    }

    .top-bar select, .top-bar button {
      padding: 8px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* 右侧单词列表 */
    #word-list {
      position: absolute;
      top: 100px;
      right: 20px;
      width: 180px;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      font-size: 16px;
      line-height: 1.5;
    }

    /* 气球元素 */
    .balloon {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .balloon:hover {
      transform: scale(1.1);
    }

    .balloon-label {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background-color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* 大炮（可拖动） */
    #cannon {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 100px;
      background-image: url('cannon.png');
      background-size: contain;
      background-repeat: no-repeat;
      cursor: grab;
    }

    #cannon:active {
      cursor: grabbing;
    }

    /* 胜利/失败提示 */
    #result {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- 顶部控制栏 -->
    <div class="top-bar">
      <select id="level-select">
        <option value="1">关卡1</option>
        <option value="2">关卡2</option>
      </select>
      <select id="difficulty-select">
        <option value="easy">难度</option>
        <option value="medium">中等</option>
        <option value="hard">困难</option>
      </select>
      <select id="mode-select">
        <option value="normal">方式</option>
        <option value="time">计时</option>
      </select>
      <button id="record-btn">记录</button>
      <button id="timer-btn">游戏计时</button>
      <button id="score-btn">得分</button>
      <button id="penalty-btn">扣分</button>
    </div>

    <!-- 右侧单词列表 -->
    <div id="word-list">
      flow<br>
      can<br>
      pear<br>
      cake<br>
      cock<br>
      egg<br>
      dog<br>
      list<br>
      apple<br>
      cat<br>
      tiger
    </div>

    <!-- 气球（示例） -->
    <div class="balloon" style="left: 30%; top: 40%; background-color: blue;">
      <span>cat</span>
    </div>
    <div class="balloon" style="left: 50%; top: 30%; background-color: red;">
      <span>apple</span>
    </div>
    <div class="balloon" style="left: 70%; top: 50%; background-color: blue;">
      <span>tiger</span>
    </div>

    <!-- 大炮 -->
    <div id="cannon"></div>

    <!-- 结果提示框 -->
    <div id="result">游戏结束！</div>
  </div>

  <script>
    // JavaScript 逻辑将在此处实现
    // 包括：气球生成、大炮旋转、点击气球、匹配单词等
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>气球射击游戏</title>
  <link rel="stylesheet" href="css/balloon.css">
</head>
<body>
  <div id="game-container">
    <!-- 顶部控制栏 -->
    <div class="top-bar">
      <select id="level-select">
        <option value="1">关卡1</option>
        <option value="2">关卡2</option>
      </select>
      <select id="difficulty-select">
        <option value="easy">难度</option>
        <option value="medium">中等</option>
        <option value="hard">困难</option>
      </select>
      <select id="mode-select">
        <option value="normal">方式</option>
        <option value="time">计时</option>
      </select>
      <button id="record-btn">记录</button>
      <button id="timer-btn">游戏计时</button>
      <button id="score-btn">得分</button>
      <button id="penalty-btn">扣分</button>
    </div>

    <!-- 右侧单词列表 -->
    <div id="word-list">
      flow<br>
      can<br>
      pear<br>
      cake<br>
      cock<br>
      egg<br>
      dog<br>
      list<br>
      apple<br>
      cat<br>
      tiger
    </div>

    <!-- 气球（示例） -->
    <div class="balloon" style="left: 30%; top: 40%; background-color: blue;">
      <span>cat</span>
    </div>
    <div class="balloon" style="left: 50%; top: 30%; background-color: red;">
      <span>apple</span>
    </div>
    <div class="balloon" style="left: 70%; top: 50%; background-color: blue;">
      <span>tiger</span>
    </div>

    <!-- 大炮 -->
    <div id="cannon"></div>

    <!-- 结果提示框 -->
    <div id="result">游戏结束！</div>
  </div>

  <script src="js/balloon.js"></script>
</body>
</html>

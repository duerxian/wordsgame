<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sentence</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="tab-logo">
                <a href="index.html" class="tab active">wordsgame</a>
            </div>
            <div class="tab-container">
                <a href="index.html" class="tab">单词表</a>
                <a href="wordgame.html" class="tab">单词连连看</a>
                <a href="typing.html" class="tab">打字练习</a>
                <a href="sentence.html" class="tab active">句子练习</a>
                <a href="balloongame.html" class="tab">气球射击游戏</a>
            </div>
        </div>
        
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章..." onkeyup="searchSentences()">
            </div>
            <div class="action-buttons">
                <button class="add-btn" onclick="showAddModal()">+ 添加文章</button>
                <button class="save-btn" onclick="saveChanges()">💾 保存</button>
            </div>
        </div>
        
        <div class="filter-controls">
            <div class="filter-group">
                <label for="gradeFilter">grade:</label>
                <select id="gradeFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="7上">7上</option>
                    <option value="7下">7下</option>
                    <option value="8上">8上</option>
                    <option value="8下">8下</option>
                    <option value="9上">9上</option>
                    <option value="9下">9下</option>
                    <option value="A-Z阅读">A-Z阅读</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="unitFilter">unit:</label>
                <select id="unitFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="languageFilter">语言:</label>
                <select id="languageFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="english" selected>英文</option>
                    <option value="meaning">中文</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortFilter">排序:</label>
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="id" selected>id</option>
                    <option value="random">随机</option>
                    <option value="az">a-z</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="killFilter">Kill:</label>
                <select id="killFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="no-kill">未斩</option>
                    <option value="kill">已斩</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="checkFilter">Check:</label>
                <select id="checkFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="unchecked">未检查</option>
                    <option value="checked">已检查</option>
                </select>
            </div>
        </div>

        <div class="word-container">
            <div class="word-section">
                <h2>文章列表</h2>
                <div class="word-list" id="normalWordContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            <div class="word-section">
                <h2>文章内容</h2>
                <div class="word-list" id="killWordContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">添加文章</h2>
            <div class="form-group">
                <label for="wordInput">文章标题:</label>
                <input type="text" id="wordInput" placeholder="输入文章标题">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="gradeInput">grade:</label>
                    <select id="gradeInput">
                        <option value="7上" selected>7上</option>
                        <option value="7下">7下</option>
                        <option value="8上">8上</option>
                        <option value="8下">8下</option>
                        <option value="9上">9上</option>
                        <option value="9下">9下</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="unitInput">unit:</label>
                    <select id="unitInput">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>

            </div>

            <div class="form-group">
                <label for="exampleInput">英文</label>
                <textarea id="exampleInput" placeholder="输入英文文章内容" rows="5"></textarea>
            </div>
            
            <div class="form-group">
                <label for="meaningInput">中文释义:</label>
                <textarea id="meaningInput" placeholder="输入中文文章内容" rows="5"></textarea>
            </div>

            <div class="form-buttons">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-save" onclick="saveWord()">保存</button>
            </div>
        </div>
    </div>
    
    <script src="js/sentence.js"></script>
</body>
</html>

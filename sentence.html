<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sentence</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="tab-logo">
                <a href="index.html" class="tab active">wordsgame</a>
            </div>
            <div class="tab-container">
                <a href="index.html" class="tab">单词表</a>
                <a href="wordgame.html" class="tab">单词连连看</a>
                <a href="sentence.html" class="tab active">句子练习</a>
            </div>
        </div>
        
        
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章..." onkeyup="searchSentences()">
            </div>
        </div>
        
        <div class="filter-controls">
            <div class="filter-group">
                <label for="gradeFilter">grade:</label>
                <select id="gradeFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="7上">7上</option>
                    <option value="7下">7下</option>
                    <option value="8上">8上</option>
                    <option value="8下">8下</option>
                    <option value="9上">9上</option>
                    <option value="9下">9下</option>
                    <option value="A-Z阅读">A-Z阅读</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="unitFilter">unit:</label>
                <select id="unitFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="languageFilter">语言:</label>
                <select id="languageFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="english" selected>英文</option>
                    <option value="meaning">中文</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortFilter">排序:</label>
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="id" selected>id</option>
                    <option value="random">随机</option>
                    <option value="az">a-z</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="killFilter">Kill:</label>
                <select id="killFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="no-kill">未斩</option>
                    <option value="kill">已斩</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="checkFilter">Check:</label>
                <select id="checkFilter" onchange="applyFilters()">
                    <option value="">无</option>
                    <option value="unchecked">unchecked</option>
                    <option value="checked">checked</option>
                </select>
            </div>
            <!-- 语音控制面板 -->
            <div class="filter-group voice-control-wrapper">
                <div class="voice-control" id="voicePanel" style="display:none;">
                    <label>音色：</label>
                    <select id="voiceSelect"></select>
                    
                    <label>语速：</label>
                    <input type="range" id="rateControl" min="0.5" max="2" step="0.1" value="0.8">
                    <span id="rateText">0.8x</span>
                </div>
            </div>
        </div>

        <div class="word-container">
            <div class="word-section article-section">
                <div class="two-section-updown">
                    <h2>文章列表</h2>
                    <div class="word-list" id="normalWordContainer">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <!-- ⭐ 文章列表分页控件 -->
                <div class="two-section-updown">
                    <div class="pagination" id="articleListPagination" style="display: none;">
                        <button onclick="goArticleListPage(1)" title="首页">«</button>
                        <button onclick="goArticleListPage(currentArticleListPage - 1)" title="上一页">&lt;</button>
                        <span id="articleListPageNumbers"></span>
                        <button onclick="goArticleListPage(currentArticleListPage + 1)" title="下一页">&gt;</button>
                        <button onclick="goArticleListPage(totalArticleListPages)" title="尾页">»</button>
                        <div class="jump-box">
                            <input type="number" id="articleListPageInput" placeholder="页码" min="1" max="1">
                            <button onclick="jumpToArticleListPage()">前往</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="word-section article-section">
                <div class="two-section-updown">
                    <h2>文章内容</h2>
                    <div class="word-list" id="killWordContainer">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <!-- ⭐ 分页控件 -->
                <div class="two-section-updown">
                    <div class="pagination" id="articlePagination" style="display: none;">
                        <button onclick="goArticlePage(1)" title="首页">«</button>
                        <button onclick="goArticlePage(currentArticlePage - 1)" title="上一页">&lt;</button>
                        <span id="articlePageNumbers"></span>
                        <button onclick="goArticlePage(currentArticlePage + 1)" title="下一页">&gt;</button>
                        <button onclick="goArticlePage(totalArticlePages)" title="尾页">»</button>
                        <div class="jump-box">
                            <input type="number" id="articlePageInput" placeholder="页码" min="1" max="1">
                            <button onclick="jumpToArticlePage()">前往</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        

    </div>
    

    
    <script src="js/sentence.js"></script>
    <script src="js/read_sentence.js"></script>
</body>
</html>
